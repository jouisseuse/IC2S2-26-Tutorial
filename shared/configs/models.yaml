# Model profiles are used only by LLM agents.
# The mock profile is the default so tutorials can run without paid API access.
models:
  default:
    provider: mock
    name: mock
    temperature: 0
    max_tokens: 128
  openai_example:
    provider: openai
    name: gpt-4o-mini
    temperature: 0.2
    max_tokens: 256
  litellm_example:
    provider: litellm
    name: openai/gpt-4o-mini
    temperature: 0.2
    max_tokens: 256
